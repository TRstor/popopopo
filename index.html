<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR Store - روابط التواصل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Phone Frame -->
        <div class="phone-frame">
            <!-- Header Banner -->
            <div class="header-banner">
                <div class="banner-badges">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Tabby_Logo.svg/512px-Tabby_Logo.svg.png" alt="Tabby" class="tabby-badge">
                    <span class="badge-text">قسمها على 4 دفعات بدون فوائد</span>
                </div>
            </div>

            <!-- Profile Section -->
            <div class="profile-section">
                <div class="profile-image">
                    <img src="https://ui-avatars.com/api/?name=TR+Store&background=8B5CF6&color=fff&size=120&font-size=0.35" alt="TR Store">
                </div>
                <h1 class="store-name">TR Store</h1>
                <p class="store-desc">متخصصون بتصميم صفحات خاصة لك</p>
                <p class="store-desc-en">Specialized in designing custom pages for you</p>

                <!-- Social Icons Row -->
                <div class="social-icons">
                    <a href="#" class="social-icon facebook" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-icon twitter" aria-label="X / Twitter"><i class="fab fa-x-twitter"></i></a>
                    <a href="#" class="social-icon instagram" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social-icon tiktok" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>

            <!-- Links Section -->
            <div class="links-section">
                <!-- Main CTA - Online Store -->
                <a href="#" class="link-btn main-store-btn">
                    <i class="fas fa-store"></i>
                    <span>المتجر الإلكتروني</span>
                    <span class="btn-subtitle">Online Store</span>
                </a>

                <!-- Two Column Links -->
                <div class="links-row">
                    <a href="#" class="link-btn whatsapp-btn">
                        <i class="fab fa-whatsapp"></i>
                        <span>واتس آب</span>
                        <span class="btn-subtitle">WhatsApp</span>
                    </a>
                    <a href="#" class="link-btn tiktok-btn">
                        <i class="fab fa-tiktok"></i>
                        <span>تيكتوك</span>
                        <span class="btn-subtitle">TikTok</span>
                    </a>
                </div>

                <!-- Three Column Links -->
                <div class="links-row three-col">
                    <a href="#" class="link-btn telegram-btn">
                        <i class="fab fa-telegram-plane"></i>
                        <span>تليجرام</span>
                        <span class="btn-subtitle">Telegram</span>
                    </a>
                    <a href="#" class="link-btn snapchat-btn">
                        <i class="fab fa-snapchat-ghost"></i>
                        <span>سناب شات</span>
                        <span class="btn-subtitle">Snapchat</span>
                    </a>
                    <a href="#" class="link-btn instagram-btn">
                        <i class="fab fa-instagram"></i>
                        <span>انستا</span>
                        <span class="btn-subtitle">Instagram</span>
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>صنع بـ ❤️ بواسطة TR Store</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
